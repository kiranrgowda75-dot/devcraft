# =============================================
# Application Properties — Project Shop Backend
# =============================================

# Server
server.port=${PORT:8081}

# Active Profile (defaults to dev)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ─── JWT ─────────────────────────────────────
# Change this to any long random secret (min 32 chars) before deploying
app.jwt.secret=${JWT_SECRET:CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_KEY_MIN_32_CHARS}
app.jwt.expiration-ms=86400000

# ─── CORS (allow Next.js dev server or Prod) ─
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# ─── Admin seed credentials ──────────────────
# DataSeeder will bcrypt it on first boot
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}

# ─── Actuator ─────────────────────────────────
# Only /actuator/health is exposed (used by Docker/uptime checks).
# Details are hidden so it never leaks internal state to the public.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
