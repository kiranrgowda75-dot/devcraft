# =============================================
# Development Profile (H2 Database)
# =============================================

# ─── Database (H2 In-Memory) ─────────────────
spring.datasource.url=jdbc:h2:mem:projectshopdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── H2 Console ──────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ─── JPA / Hibernate ─────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Batch-fetch lazy collections/associations
spring.jpa.properties.hibernate.default_batch_fetch_size=50

# Batch inserts/updates
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ─── ImageKit ────────────────────────────────────
imagekit.private-key=${IMAGEKIT_PRIVATE_KEY:private_3KZXsml1Yh8YXaqCa6d7tcx/3ow=}
